<div class="background-recovery">
  <div class="recovery-card">

    <div class="icon-area">
      🔒
    </div>

    <h2>Recuperar Senha</h2>
    <p class="subtitle">
      Informe seu e-mail cadastrado para receber uma senha provisória.
    </p>

    <div class="input-group">
      <label>E-mail</label>
      <input 
        type="email" 
        [(ngModel)]="email" 
        placeholder="Digite seu e-mail">
    </div>

    <p *ngIf="mensagem"
       [ngClass]="erro ? 'mensagem-erro' : 'mensagem-sucesso'">
       {{ mensagem }}
    </p>

    <button (click)="recuperar()" [disabled]="carregando">
      {{ carregando ? 'Enviando...' : 'Enviar Nova Senha' }}
    </button>

    <div class="links">
      <a routerLink="/login">← Voltar para o Login</a>
    </div>

  </div>
</div>
