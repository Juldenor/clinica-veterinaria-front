<div class="container-center">
  <div class="glass-card-wide" style="max-width: 600px;">
    <h2 style="color: var(--info);">👥 Cadastrar Novo Cliente</h2>
    <hr style="margin-bottom: 25px; border-color: var(--border-color);">
    
    <div class="grid-2">
      <div class="form-group">
        <label>Nome Completo</label>
        <input type="text" class="modern-input" [(ngModel)]="cliente.nome" placeholder="Maria da Silva">
      </div>
      
      <div class="form-group">
        <label>Telefone</label>
        <input type="text" class="modern-input" [(ngModel)]="cliente.telefone" placeholder="(11) 99999-9999">
      </div>

      <div class="form-group" style="grid-column: span 2;">
        <label>CPF</label>
        <input type="text" class="modern-input" [(ngModel)]="cliente.cpf" placeholder="000.000.000-00">
      </div>
    </div>

    <p *ngIf="mensagem" [ngClass]="erro ? 'msg-error' : 'msg-success'">{{ mensagem }}</p>

    <div class="flex-gap" style="margin-top: 20px;">
      <button class="btn btn-info" style="flex: 1;" (click)="salvar()">Salvar Cliente</button>
      <button class="btn btn-secondary" routerLink="/painel">Cancelar</button>
    </div>
  </div>
</div>
