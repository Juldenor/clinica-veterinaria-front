<div class="container-center" style="background: linear-gradient(135deg, var(--info) 0%, var(--secondary) 100%);">
  <div class="glass-card">
    <div style="text-align: center; margin-bottom: 25px;">
      <h1 style="font-size: 3rem; margin-bottom: 10px;">👋</h1>
      <h2 style="color: var(--text-main); margin-bottom: 5px;">Criar Nova Conta</h2>
      <p style="color: var(--text-muted); font-size: 0.9rem;">Junte-se a nós em apenas um passo</p>
    </div>

    <div class="form-group">
      <label>E-mail</label>
      <input type="email" class="modern-input" [(ngModel)]="email" placeholder="nome@exemplo.com">
    </div>

    <div class="form-group">
      <label>Senha</label>
      <input type="password" class="modern-input" [(ngModel)]="senha" placeholder="••••••••">
    </div>

    <p *ngIf="mensagem" [ngClass]="erro ? 'msg-error' : 'msg-success'">{{ mensagem }}</p>

    <button class="btn btn-success" style="margin-top: 15px;" (click)="criarConta()">Finalizar Cadastro</button>

    <div style="text-align: center; margin-top: 25px; font-size: 0.9rem;">
      <a routerLink="/login" style="color: var(--text-muted); text-decoration: none; font-weight: 500;">Já tenho conta. <span style="color: var(--primary);">Fazer Login</span></a>
    </div>
  </div>
</div>
