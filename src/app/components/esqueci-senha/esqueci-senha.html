<div class="container-center" style="background: linear-gradient(135deg, var(--warning) 0%, var(--danger) 100%);">
  <div class="glass-card">
    <div style="text-align: center; margin-bottom: 25px;">
      <h1 style="font-size: 3rem; margin-bottom: 10px;">🔒</h1>
      <h2 style="color: var(--text-main); margin-bottom: 5px;">Recuperar Senha</h2>
      <p style="color: var(--text-muted); font-size: 0.9rem; line-height: 1.4;">Informe seu e-mail cadastrado para receber uma senha provisória imediatamente.</p>
    </div>

    <div class="form-group">
      <label>E-mail Cadastrado</label>
      <input type="email" class="modern-input" [(ngModel)]="email" placeholder="nome@exemplo.com">
    </div>

    <p *ngIf="mensagem" [ngClass]="erro ? 'msg-error' : 'msg-success'" style="text-align: center;">{{ mensagem }}</p>

    <button class="btn btn-warning" style="margin-top: 15px;" (click)="recuperar()" [disabled]="carregando || sucesso">
      {{ sucesso ? 'E-mail Enviado!' : (carregando ? 'Enviando...' : 'Enviar Nova Senha') }}
    </button>

    <div style="text-align: center; margin-top: 25px; font-size: 0.9rem;">
      <a routerLink="/login" style="color: var(--text-muted); text-decoration: none; font-weight: 500;">← Voltar para o Login</a>
    </div>
  </div>
</div>
