<div class="container-center" style="background: linear-gradient(135deg, var(--primary) 0%, var(--purple) 100%);">
  <div class="glass-card">
    <div style="text-align: center; margin-bottom: 25px;">
      <h1 style="font-size: 3rem; margin-bottom: 10px;">🐾</h1>
      <h2 style="color: var(--text-main); margin-bottom: 5px;">Clínica J-Vet</h2>
      <p style="color: var(--text-muted); font-size: 0.9rem;">Acesse o sistema para continuar</p>
    </div>

    <div class="form-group">
      <label>E-mail</label>
      <input type="email" class="modern-input" [(ngModel)]="email" placeholder="nome@exemplo.com">
    </div>

    <div class="form-group">
      <label>Senha</label>
      <input type="password" class="modern-input" [(ngModel)]="senha" placeholder="••••••••">
    </div>

    <p *ngIf="mensagemErro" class="msg-error">{{ mensagemErro }}</p>

    <button class="btn btn-primary" style="margin-top: 15px;" (click)="fazerLogin()">Entrar na Conta</button>

    <div style="display: flex; justify-content: space-between; margin-top: 25px; font-size: 0.9rem;">
      <a routerLink="/esqueci-senha" style="color: var(--primary); text-decoration: none; font-weight: 500;">Esqueci minha senha</a>
      <a routerLink="/registrar" style="color: var(--primary); text-decoration: none; font-weight: 500;">Criar uma conta</a>
    </div>
  </div>
</div>
