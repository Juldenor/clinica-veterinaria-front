<div class="container-center">
  <div class="glass-card-wide" style="max-width: 600px;">
    <h2 style="color: var(--primary);">🐶 Cadastrar Novo Animal</h2>
    <hr style="margin-bottom: 25px; border-color: var(--border-color);">
    
    <div class="grid-2">
      <div class="form-group">
        <label>Nome do Animal</label>
        <input type="text" class="modern-input" [(ngModel)]="animal.nome" placeholder="Ex: Rex">
      </div>
      
      <div class="form-group">
        <label>Raça</label>
        <input type="text" class="modern-input" [(ngModel)]="animal.raca" placeholder="Ex: Golden Retriever">
      </div>

      <div class="form-group">
        <label>Idade (anos)</label>
        <input type="number" class="modern-input" [(ngModel)]="animal.idade" placeholder="Ex: 5">
      </div>

      <div class="form-group">
        <label>Dono (Cliente)</label>
        <select class="modern-input" [(ngModel)]="animal.clienteId">
          <option [ngValue]="null" disabled>-- Escolha o Dono --</option>
          <option *ngFor="let cliente of clientes" [ngValue]="cliente.id">{{ cliente.nome }} (CPF: {{ cliente.cpf }})</option>
        </select>
      </div>
    </div>

    <p *ngIf="mensagem" [ngClass]="erro ? 'msg-error' : 'msg-success'">{{ mensagem }}</p>

    <div class="flex-gap" style="margin-top: 20px;">
      <button class="btn btn-primary" style="flex: 1;" (click)="salvar()">Salvar Animal</button>
      <button class="btn btn-secondary" routerLink="/painel">Cancelar</button>
    </div>
  </div>
</div>
