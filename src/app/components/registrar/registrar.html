<div style="max-width: 400px; margin: 50px auto; padding: 20px; border: 1px solid #ccc; border-radius: 8px;">
  <h2>Criar Nova Conta</h2>
  
  <div style="margin-bottom: 15px;">
    <label>E-mail:</label><br>
    <input type="email" [(ngModel)]="email" style="width: 100%; padding: 8px;">
  </div>

  <div style="margin-bottom: 15px;">
    <label>Senha:</label><br>
    <input type="password" [(ngModel)]="senha" style="width: 100%; padding: 8px;">
  </div>

  <p *ngIf="mensagem" [ngStyle]="{'color': erro ? 'red' : 'green'}">{{ mensagem }}</p>

  <button (click)="criarConta()" style="width: 100%; padding: 10px; background-color: #17a2b8; color: white; border: none; cursor: pointer; margin-bottom: 15px;">Cadastrar</button>

  <p style="text-align: center;">
    <a routerLink="/login" style="color: #6c757d; text-decoration: none;">Já tenho conta. Fazer Login</a>
  </p>
</div>
